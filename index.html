<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }

        .container{
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: blue;
            color: white;
            border: none;
        }

        button:hover{
            background: darkblue;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Student Registration Form</h2>

    <form>

        <input type="text" placeholder="Enter Name">

        <input type="email" placeholder="Enter Email">

        <input type="text" placeholder="Enter Course">

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
